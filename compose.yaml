x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vk_tutors}
      POSTGRES_USER: ${POSTGRES_USER:-vk_tutors}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vk_tutors}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build: ./backend
    logging: *default-logging
    command: ["alembic", "upgrade", "head"]
    env_file: ${ENV_FILE:-.env}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://vk_tutors:vk_tutors@postgres:5432/vk_tutors}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: ./backend
    restart: unless-stopped
    logging: *default-logging
    env_file: ${ENV_FILE:-.env}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://vk_tutors:vk_tutors@postgres:5432/vk_tutors}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - media_data:/data/media

  vk-listener:
    build: ./backend
    command: ["python", "-m", "app.integrations.vk.listener"]
    logging: *default-logging
    env_file: ${ENV_FILE:-.env}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://vk_tutors:vk_tutors@postgres:5432/vk_tutors}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
      - media_data:/data/media

  worker:
    build: ./backend
    command: ["python", "-m", "app.scheduler.worker"]
    logging: *default-logging
    env_file: ${ENV_FILE:-.env}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://vk_tutors:vk_tutors@postgres:5432/vk_tutors}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build: ./frontend
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${APP_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
